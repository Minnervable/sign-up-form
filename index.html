<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TOP Sign Up Form</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./style.css">
</head>

<body>
	<div class="content-wrapper">
		<header>
			<p>This service is one you will be asking yourself how you ever lived without it</p>
			<p>Sign up below!</p>
		</header>
		<main>
			<form id="sign-up" class="form-wrapper" name="sign-up">
				<label for="sign-up">Let's do this!</label>
				<fieldset class="field-wrapper">
					<label for="first-name">FIRST NAME</label>
					<input name="first-name" placeholder="Thor" type="text">
				</fieldset>
				<fieldset class="field-wrapper">
					<label for="last-name">LAST NAME</label>
					<input name="last-name" placeholder="Robinson" type="text">
				</fieldset>
				<fieldset class="field-wrapper">
					<label for="email">EMAIL</label>
					<input name="email" placeholder="trobinson@example.com" type="email">
				</fieldset>
				<fieldset class="field-wrapper">
					<label for="phone-number">PHONE NUMBER</label>
					<input name="phone-number" type="tel" placeholder="555-555-5555">
				</fieldset>
				<fieldset class="field-wrapper">
					<label for="password">PASSWORD</label>
					<input name="password" placeholder="super secret password here" type="text">
				</fieldset>
				<fieldset class="field-wrapper">
					<label for="confirm-password">CONFIRM PASSWORD</label>
					<input name="confirm-password" placeholder="the same password here" type="text">
					</fieldset>
					</form>
					</main>
					<footer>
						<button type="submit" form="sign-up">Create Account</button>
						<p>Already have an account?<a href="">Log in</a></p>
					</footer>
	</div>
	<aside>
		<img src="./assets/odin-lined.png" alt="logo-of-greek-gods-head">
	</aside>

</body>

</html>
